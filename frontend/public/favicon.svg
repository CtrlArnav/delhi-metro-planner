<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Metro train icon -->
  <rect width="32" height="32" rx="6" fill="#E4002B"/>
  
  <!-- Train body -->
  <rect x="8" y="10" width="16" height="12" rx="2" fill="white"/>
  
  <!-- Windows -->
  <rect x="10" y="12" width="4" height="4" rx="0.5" fill="#E4002B"/>
  <rect x="18" y="12" width="4" height="4" rx="0.5" fill="#E4002B"/>
  
  <!-- Wheels -->
  <circle cx="12" cy="24" r="2" fill="white"/>
  <circle cx="20" cy="24" r="2" fill="white"/>
  
  <!-- Rail line -->
  <rect x="6" y="22" width="20" height="1" fill="white"/>
</svg>
